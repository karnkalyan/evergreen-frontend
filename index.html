  <style>
    /* Custom Scrollbar for Webkit browsers (Chrome, Safari) */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #f8fafc; /* slate-50 */
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(to bottom, #2bb6a6, #2f80ed); /* primary-gradient */
      border-radius: 6px;
      border: 3px solid #f8fafc; /* slate-50 */
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(to bottom, #249d8f, #2873d4);
    }

    /* Custom Scrollbar for Firefox */
    html {
        scrollbar-width: thin;
        scrollbar-color: #2bb6a6 #f8fafc;
    }
    
    /* Quill Editor custom height */
    .ql-editor {
      min-height: 200px;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {

          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Merriweather', 'serif'],
            poppins: ['Poppins', 'sans-serif'],
          },
          colors: {
            primaryStart: '#2bb6a6',
            primaryEnd: '#2f80ed',
            coral: '#FF7A7A',
            amber: {
              300: '#fcd34d',
              500: '#f59e0b',
            },
            slate: {
              900: '#0f172a',
              800: '#1e293b',

          borderRadius: {

            'secondary-gradient': 'linear-gradient(to right, #fcd34d, #f59e0b)',
          },
          typography: ({ theme }) => ({
            DEFAULT: {
              css: {
                '--tw-prose-body': theme('colors.slate[600]'),
                '--tw-prose-headings': theme('colors.slate[900]'),
                '--tw-prose-lead': theme('colors.slate[600]'),
